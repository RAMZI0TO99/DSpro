services:

  # ── Qdrant Vector Database ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dspro_qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dspro_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
      # Cache settings - use cached models FIRST before downloading
      - HUGGINGFACE_HUB_CACHE=/root/.cache/huggingface
      - TORCH_HOME=/root/.cache/torch
      - EASYOCR_HOME=/root/.EasyOCR
      - HF_HOME=/root/.cache/huggingface
      - HF_HUB_LOCAL_FILES_ONLY=0
    volumes:
      # Application & media
      - ./media:/app/media
      
      # ── MODEL CACHES (PERSIST across restarts) ──
      # These map host directories → container cache directories
      # Models downloaded during build are cached here
      # On subsequent runs, models load from cache BEFORE attempting network download
      - huggingface_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
      - easyocr_cache:/root/.EasyOCR
      - fastembed_cache:/root/.local/share/fastembed
      
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

    # ── GPU passthrough (Docker Desktop + WSL2) ──────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

# ── Named Volumes (persist models across restarts) ─────────────────────
volumes:
  qdrant_data:
    driver: local
  huggingface_cache:
    driver: local
  torch_cache:
    driver: local
  easyocr_cache:
    driver: local
  fastembed_cache:
    driver: local
