services:

  # ── Qdrant Vector Database ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dspro_qdrant
    ports:
      - "6333:6333"   # REST API (also used by the Python client)
      - "6334:6334"   # gRPC (optional, good to expose for future use)
    volumes:
      - qdrant_data:/qdrant/storage   # Named volume: survives container restarts
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dspro_backend
    ports:
      - "8000:8000"
    env_file:
      - .env                          # Injects GEMINI_API_KEY at runtime (never baked into image)
    environment:
      - QDRANT_URL=http://qdrant:6333 # Docker internal network DNS — backend finds Qdrant by service name
    volumes:
      - ./media:/app/media            # Bind-mount: your video files persist on the host at ./media
    depends_on:
      qdrant:
        condition: service_healthy    # Wait until Qdrant passes its health check before starting
    restart: unless-stopped

    # ── RTX 2050 GPU passthrough (Docker Desktop + WSL2) ──────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

# ── Named Volumes ─────────────────────────────────────────────────────
volumes:
  qdrant_data:    # Qdrant's index files live here — persists across container restarts
