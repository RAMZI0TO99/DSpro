services:

  # ── Qdrant Vector Database ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: dspro_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    image: dspro_backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dspro_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333

      # ── Model cache paths (point to baked-in image directories) ──────
      - HF_HOME=/app/models/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/models/huggingface/hub
      - TORCH_HOME=/app/models/torch
      - EASYOCR_HOME=/app/models/easyocr
      - FASTEMBED_CACHE_PATH=/app/models/fastembed
      - NLTK_DATA=/root/nltk_data
      - HF_HUB_LOCAL_FILES_ONLY=1
      - HF_HUB_OFFLINE=1

      # ── LLM Configuration (change these to switch your LLM provider) ─
      # Provider: local | ollama | gemini | openai | custom
      - LLM_PROVIDER=local
      # Base URL for local LM Studio or Ollama (use host.docker.internal to reach host PC)
      - LLM_BASE_URL=http://host.docker.internal:1234/v1
      # Model name as it appears in your LM Studio / Ollama model list
      - LLM_MODEL=Llama-3.2-3B-Instruct-Q4_K_M

    volumes:
      # Application media (user uploads)
      - media_data:/app/media

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped

    # ── GPU passthrough (Docker Desktop + WSL2) ──────────────────────
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

# ── Named Volumes ─────────────────────────────────────────────────────
volumes:
  qdrant_data:
    driver: local
  media_data:
    driver: local
